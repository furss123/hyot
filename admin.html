<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0c0f1a">
  <title>관리자 · HyoT의 자료실</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header site-header--compact">
    <div class="container site-header__inner">
      <a href="./" class="brand brand--link">
        <img class="brand__logo" src="assets/logo.png" alt="HyoT" width="86" height="86">
        <div>
          <p class="brand__eyebrow">HyoT의 자료실</p>
          <h1 class="brand__title brand__title--sm">관리자</h1>
        </div>
      </a>
      <a href="./" class="admin-btn admin-btn--link">← 자료실</a>
    </div>
  </header>

  <main class="site-main admin-page" id="main-content">
    <div class="container admin-wrap">

      <section id="admin-login-view" class="admin-login-card" aria-labelledby="admin-login-title">
        <h2 id="admin-login-title" class="admin-login-card__title">로그인</h2>
        <form id="admin-login-form" class="admin-form">
          <label class="admin-field">
            <span class="admin-field__label">아이디</span>
            <input id="admin-id" class="admin-field__input" type="text" autocomplete="username" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">비밀번호</span>
            <input id="admin-password" class="admin-field__input" type="password" autocomplete="current-password" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">GitHub 토큰</span>
            <input id="admin-token" class="admin-field__input" type="password" autocomplete="off" placeholder="repo 권한" required>
          </label>
          <p class="admin-hint">
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=HyoT-admin" target="_blank" rel="noopener noreferrer">토큰 발급</a>
          </p>
          <div class="admin-login-options">
            <label class="admin-check">
              <input type="checkbox" id="admin-remember">
              <span>입력 내용 저장</span>
            </label>
            <label class="admin-check">
              <input type="checkbox" id="admin-auto-login">
              <span>자동 로그인</span>
            </label>
          </div>
          <p id="admin-login-error" class="admin-error" role="alert"></p>
          <button type="button" class="admin-btn-check" id="admin-verify-token">repo 권한 확인</button>
          <button type="submit" class="btn-download" id="admin-login-submit">로그인</button>
        </form>
      </section>

      <section id="admin-panel-view" class="admin-workspace is-hidden" hidden aria-label="자료 관리">
        <div class="admin-topbar">
          <button type="button" class="admin-topbar__primary" id="admin-new-btn">+ 새 자료</button>
          <div class="admin-topbar__right">
            <button type="button" class="admin-topbar__link" id="admin-logout-btn">로그아웃</button>
          </div>
        </div>

        <p id="admin-panel-status" class="admin-toast" role="status" hidden></p>

        <div class="admin-layout">
          <nav class="admin-list-wrap" aria-label="등록된 자료">
            <ul id="admin-item-list" class="admin-list"></ul>
            <p id="admin-list-empty" class="admin-list-empty">등록된 자료가 없습니다.<br>「+ 새 자료」로 추가하세요.</p>
          </nav>

          <form id="admin-utility-form" class="admin-editor" aria-labelledby="admin-editor-badge">
            <p id="admin-editor-badge" class="admin-editor__badge">새 자료</p>

            <div class="admin-editor__fields">
              <label class="admin-field">
                <span class="admin-field__label">이름</span>
                <input id="admin-name" class="admin-field__input" type="text" required maxlength="80" placeholder="프로그램 이름">
              </label>

              <label class="admin-field">
                <span class="admin-field__label">설명</span>
                <textarea id="admin-description" class="admin-field__input" rows="3" required maxlength="200" placeholder="짧은 설명"></textarea>
              </label>

              <label class="admin-field">
                <span class="admin-field__label">업데이트 날짜</span>
                <input id="admin-updated-at" class="admin-field__input admin-field__input--readonly" type="text" readonly tabindex="-1" aria-readonly="true">
                <p class="admin-hint">저장(업로드) 시점의 날짜·시간이 자동으로 기록됩니다.</p>
              </label>

              <div class="admin-field">
                <span class="admin-field__label" id="admin-file-label">파일 <span id="admin-file-required" class="admin-required">*</span></span>
                <label class="admin-file-btn" id="admin-dropzone">
                  <input id="admin-file" class="admin-file-btn__input" type="file">
                  <span id="admin-file-display">파일 선택</span>
                </label>
                <p class="admin-hint">브라우저 업로드는 최대 25MB까지 가능합니다.</p>
                <label class="admin-check admin-check--block">
                  <input type="checkbox" id="admin-file-manual">
                  <span>저장소에 파일을 직접 올렸음 (25MB 초과)</span>
                </label>
                <div id="admin-file-manual-wrap" class="admin-file-manual-wrap" hidden>
                  <label class="admin-field admin-field--nested">
                    <span class="admin-field__label">파일 경로</span>
                    <input id="admin-file-path" class="admin-field__input" type="text" placeholder="downloads/파일명.exe" autocomplete="off">
                    <p class="admin-hint">먼저 GitHub 저장소의 <code>downloads/</code> 폴더에 파일을 push한 뒤, 그 경로를 입력하세요.</p>
                  </label>
                </div>
              </div>
            </div>

            <div class="admin-editor__actions">
              <button type="submit" class="btn-download btn-save-progress" id="admin-submit-btn" data-default-label="저장">
                <span class="btn-save-progress__fill" aria-hidden="true"></span>
                <span class="btn-save-progress__label">저장</span>
              </button>
              <button type="button" class="admin-btn-danger" id="admin-delete-btn" hidden>삭제</button>
            </div>
          </form>
        </div>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__copy">&copy; <span id="footer-year"></span> HyoT의 자료실</p>
    </div>
  </footer>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin.js" defer></script>
  <script>
    document.getElementById("footer-year").textContent = String(new Date().getFullYear());
  </script>
</body>
</html>
