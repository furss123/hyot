<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자 · HyoT의 자료실</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container site-header__inner">
      <a href="./" class="brand brand--link">
        <img class="brand__logo" src="assets/logo.png" alt="" width="72" height="72">
        <div>
          <p class="brand__eyebrow">HyoT의 자료실</p>
          <h1 class="brand__title brand__title--sm">관리자</h1>
        </div>
      </a>
      <a href="./" class="admin-btn admin-btn--link">← 자료실</a>
    </div>
  </header>

  <main class="site-main admin-page">
    <div class="container admin-page__container">

      <section id="admin-login-view" class="admin-card">
        <h2 class="admin-card__title">관리자 로그인</h2>
        <p class="admin-lead">자료 등록·수정은 관리자만 가능합니다.</p>
        <form id="admin-login-form" class="admin-form">
          <label class="admin-field">
            <span class="admin-field__label">아이디</span>
            <input id="admin-id" class="admin-field__input" type="text" autocomplete="username" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">비밀번호</span>
            <input id="admin-password" class="admin-field__input" type="password" autocomplete="current-password" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">GitHub Personal Access Token</span>
            <input id="admin-token" class="admin-field__input" type="password" autocomplete="off" placeholder="ghp_..." required>
          </label>
          <p class="admin-hint">
            파일 업로드용 ·
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=HyoT-admin" target="_blank" rel="noopener noreferrer">토큰 발급</a>
            (classic · <code>repo</code>)
          </p>
          <p id="admin-login-error" class="admin-error" role="alert"></p>
          <button type="submit" class="btn-download admin-form__submit">로그인</button>
        </form>
      </section>

      <section id="admin-panel-view" class="admin-card" hidden>
        <div class="admin-toolbar">
          <div>
            <p class="admin-card__subtitle">자료 관리</p>
            <p id="admin-user-label" class="admin-user"></p>
          </div>
          <button type="button" class="admin-link-btn" id="admin-logout-btn">로그아웃</button>
        </div>

        <div class="admin-mode-tabs">
          <button type="button" class="admin-mode admin-mode--active" id="admin-mode-new">새 등록</button>
          <button type="button" class="admin-mode" id="admin-mode-edit">수정</button>
        </div>

        <form id="admin-utility-form" class="admin-form">
          <div id="admin-edit-select-wrap" class="admin-field" hidden>
            <span class="admin-field__label">항목 선택</span>
            <select id="admin-edit-select" class="admin-field__input admin-field__select"></select>
          </div>

          <label class="admin-field">
            <span class="admin-field__label">프로그램 이름</span>
            <input id="admin-name" class="admin-field__input" type="text" required maxlength="80">
          </label>

          <label class="admin-field">
            <span class="admin-field__label">설명</span>
            <textarea id="admin-description" class="admin-field__input admin-field__textarea" rows="3" required maxlength="200"></textarea>
          </label>

          <label class="admin-field">
            <span class="admin-field__label">파일 업로드 <span id="admin-file-required" class="admin-required">*</span></span>
            <input id="admin-file" class="admin-field__file" type="file">
            <span id="admin-file-hint" class="admin-hint">ZIP, EXE 등 배포 파일을 선택하세요.</span>
          </label>

          <label class="admin-field">
            <span class="admin-field__label">업데이트 날짜</span>
            <input id="admin-updated-at" class="admin-field__input admin-field__readonly" type="text" readonly>
            <span class="admin-hint">저장 시 오늘 날짜로 자동 설정됩니다.</span>
          </label>

          <p id="admin-panel-status" class="admin-status" role="status"></p>

          <div class="admin-actions">
            <button type="submit" class="btn-download" id="admin-submit-btn">저장</button>
            <button type="button" class="admin-btn-danger" id="admin-delete-btn" hidden>삭제</button>
          </div>
        </form>
      </section>

    </div>
  </main>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
