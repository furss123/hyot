<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자 · HyoT의 자료실</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header site-header--compact">
    <div class="container site-header__inner">
      <a href="./" class="brand brand--link">
        <img class="brand__logo" src="assets/logo.png" alt="" width="86" height="86">
        <div>
          <p class="brand__eyebrow">HyoT의 자료실</p>
          <h1 class="brand__title brand__title--sm">관리자</h1>
        </div>
      </a>
    </div>
  </header>

  <main class="site-main admin-page">
    <div class="container admin-wrap">

      <section id="admin-login-view" class="admin-login-card">
        <h2 class="admin-login-card__title">로그인</h2>
        <form id="admin-login-form" class="admin-form">
          <label class="admin-field">
            <span class="admin-field__label">아이디</span>
            <input id="admin-id" class="admin-field__input" type="text" autocomplete="username" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">비밀번호</span>
            <input id="admin-password" class="admin-field__input" type="password" autocomplete="current-password" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">GitHub 토큰</span>
            <input id="admin-token" class="admin-field__input" type="password" autocomplete="off" placeholder="repo 권한" required>
          </label>
          <p class="admin-hint">
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=HyoT-admin" target="_blank" rel="noopener noreferrer">토큰 발급</a>
          </p>
          <p id="admin-login-error" class="admin-error" role="alert"></p>
          <button type="submit" class="btn-download">로그인</button>
        </form>
      </section>

      <section id="admin-panel-view" class="admin-workspace" hidden>
        <div class="admin-topbar">
          <button type="button" class="admin-topbar__primary" id="admin-new-btn">+ 새 자료</button>
          <div class="admin-topbar__right">
            <a href="./" class="admin-topbar__link">자료실</a>
            <button type="button" class="admin-topbar__link" id="admin-logout-btn">로그아웃</button>
          </div>
        </div>

        <p id="admin-panel-status" class="admin-toast" role="status" hidden></p>

        <div class="admin-layout">
          <nav class="admin-list-wrap" aria-label="자료 목록">
            <ul id="admin-item-list" class="admin-list"></ul>
            <p id="admin-list-empty" class="admin-list-empty">등록된 자료가 없습니다.<br>「+ 새 자료」로 추가하세요.</p>
          </nav>

          <form id="admin-utility-form" class="admin-editor">
            <p id="admin-editor-badge" class="admin-editor__badge">새 자료</p>

            <label class="admin-field">
              <span class="admin-field__label">이름</span>
              <input id="admin-name" class="admin-field__input" type="text" required maxlength="80" placeholder="프로그램 이름">
            </label>

            <label class="admin-field">
              <span class="admin-field__label">설명</span>
              <textarea id="admin-description" class="admin-field__input" rows="3" required maxlength="200" placeholder="짧은 설명"></textarea>
            </label>

            <label class="admin-field">
              <span class="admin-field__label" id="admin-file-label">파일 <span id="admin-file-required" class="admin-required">*</span></span>
              <label class="admin-file-btn" id="admin-dropzone">
                <input id="admin-file" class="admin-file-btn__input" type="file">
                <span id="admin-file-display">파일 선택</span>
              </label>
            </label>

            <div class="admin-editor__actions">
              <button type="submit" class="btn-download" id="admin-submit-btn">저장</button>
              <button type="button" class="admin-btn-danger" id="admin-delete-btn" hidden>삭제</button>
            </div>
          </form>
        </div>
      </section>

    </div>
  </main>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
