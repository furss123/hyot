name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject admin credentials (not stored in main branch)
        run: |
          node <<'NODE'
          const fs = require("fs");
          const id = process.env.HYOT_ADMIN_ID || "";
          const hash = process.env.HYOT_ADMIN_PASSWORD_SHA256 || "";
          if (!id || !hash) {
            console.log("::warning::HYOT_ADMIN_ID / HYOT_ADMIN_PASSWORD_SHA256 not set. Admin login disabled on site.");
            fs.writeFileSync("js/admin-auth.js", "window.HYOT_ADMIN_SECRETS=null;\n");
          } else {
            const payload = { adminId: id, adminPasswordSha256: hash };
            fs.writeFileSync(
              "js/admin-auth.js",
              `window.HYOT_ADMIN_SECRETS=${JSON.stringify(payload)};\n`
            );
          }
          const feedbackToken = process.env.HYOT_FEEDBACK_TOKEN || "";
          const ingestKey = process.env.FEEDBACK_INGEST_KEY || "";
          const lines = ["/** Deploy-time only — not committed on main */"];
          if (feedbackToken) {
            const b64 = Buffer.from(feedbackToken, "utf8").toString("base64");
            lines.push(`window.HYOT_FEEDBACK_TOKEN_B64=${JSON.stringify(b64)};`);
            lines.push(
              "window.HYOT_FEEDBACK_TOKEN=typeof atob!=='undefined'?atob(window.HYOT_FEEDBACK_TOKEN_B64):'';"
            );
          } else {
            lines.push("window.HYOT_FEEDBACK_TOKEN_B64='';");
            lines.push("window.HYOT_FEEDBACK_TOKEN=null;");
            console.log("::warning::HYOT_FEEDBACK_TOKEN not set.");
          }
          if (ingestKey) {
            lines.push(`window.HYOT_FEEDBACK_INGEST_KEY=${JSON.stringify(ingestKey)};`);
          } else {
            lines.push("window.HYOT_FEEDBACK_INGEST_KEY=null;");
          }
          fs.writeFileSync("js/feedback-auth.js", lines.join("\n") + "\n");
          NODE
        env:
          HYOT_ADMIN_ID: ${{ secrets.HYOT_ADMIN_ID }}
          HYOT_ADMIN_PASSWORD_SHA256: ${{ secrets.HYOT_ADMIN_PASSWORD_SHA256 }}
          HYOT_FEEDBACK_TOKEN: ${{ secrets.HYOT_FEEDBACK_TOKEN }}
          FEEDBACK_INGEST_KEY: ${{ secrets.FEEDBACK_INGEST_KEY }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: .github
