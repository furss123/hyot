name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject admin credentials (not stored in main branch)
        run: |
          node <<'NODE'
          const fs = require("fs");
          const id = process.env.HYOT_ADMIN_ID || "";
          const hash = process.env.HYOT_ADMIN_PASSWORD_SHA256 || "";
          if (!id || !hash) {
            console.log("::warning::HYOT_ADMIN_ID / HYOT_ADMIN_PASSWORD_SHA256 not set. Admin login disabled on site.");
            fs.writeFileSync("js/admin-auth.js", "window.HYOT_ADMIN_SECRETS=null;\n");
          } else {
            const payload = { adminId: id, adminPasswordSha256: hash };
            fs.writeFileSync(
              "js/admin-auth.js",
              `window.HYOT_ADMIN_SECRETS=${JSON.stringify(payload)};\n`
            );
          }
          const fb = {
            apiKey: process.env.HYOT_FIREBASE_API_KEY || "",
            authDomain: process.env.HYOT_FIREBASE_AUTH_DOMAIN || "",
            projectId: process.env.HYOT_FIREBASE_PROJECT_ID || "",
            storageBucket: process.env.HYOT_FIREBASE_STORAGE_BUCKET || "",
            messagingSenderId: process.env.HYOT_FIREBASE_MESSAGING_SENDER_ID || "",
            appId: process.env.HYOT_FIREBASE_APP_ID || "",
            collection: "feedback_posts",
          };
          if (!fb.projectId || !fb.apiKey || !fb.appId) {
            console.log("::warning::Firebase config incomplete. Set HYOT_FIREBASE_* secrets.");
          }
          if (!fb.authDomain && fb.projectId) {
            fb.authDomain = `${fb.projectId}.firebaseapp.com`;
          }
          if (!fb.storageBucket && fb.projectId) {
            fb.storageBucket = `${fb.projectId}.appspot.com`;
          }
          fs.writeFileSync(
            "js/firebase-config.js",
            `/** Deploy-time — see docs/feedback-firebase-setup.md */\nwindow.HYOT_FIREBASE_CONFIG=${JSON.stringify(fb, null, 2)};\n`
          );
          const feedbackToken = process.env.HYOT_FEEDBACK_TOKEN || "";
          const ingestKey = process.env.FEEDBACK_INGEST_KEY || "";
          const authLines = ["/** Deploy-time GitHub fallback (optional) */"];
          if (feedbackToken) {
            const b64 = Buffer.from(feedbackToken, "utf8").toString("base64");
            authLines.push(`window.HYOT_FEEDBACK_TOKEN_B64=${JSON.stringify(b64)};`);
            authLines.push(
              "window.HYOT_FEEDBACK_TOKEN=typeof atob!=='undefined'?atob(window.HYOT_FEEDBACK_TOKEN_B64):'';"
            );
          } else {
            authLines.push("window.HYOT_FEEDBACK_TOKEN_B64='';");
            authLines.push("window.HYOT_FEEDBACK_TOKEN=null;");
          }
          if (ingestKey) {
            authLines.push(`window.HYOT_FEEDBACK_INGEST_KEY=${JSON.stringify(ingestKey)};`);
          } else {
            authLines.push("window.HYOT_FEEDBACK_INGEST_KEY=null;");
          }
          fs.writeFileSync("js/feedback-auth.js", authLines.join("\n") + "\n");
          NODE
        env:
          HYOT_ADMIN_ID: ${{ secrets.HYOT_ADMIN_ID }}
          HYOT_ADMIN_PASSWORD_SHA256: ${{ secrets.HYOT_ADMIN_PASSWORD_SHA256 }}
          HYOT_FIREBASE_API_KEY: ${{ secrets.HYOT_FIREBASE_API_KEY }}
          HYOT_FIREBASE_AUTH_DOMAIN: ${{ secrets.HYOT_FIREBASE_AUTH_DOMAIN }}
          HYOT_FIREBASE_PROJECT_ID: ${{ secrets.HYOT_FIREBASE_PROJECT_ID }}
          HYOT_FIREBASE_STORAGE_BUCKET: ${{ secrets.HYOT_FIREBASE_STORAGE_BUCKET }}
          HYOT_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.HYOT_FIREBASE_MESSAGING_SENDER_ID }}
          HYOT_FIREBASE_APP_ID: ${{ secrets.HYOT_FIREBASE_APP_ID }}
          HYOT_FEEDBACK_TOKEN: ${{ secrets.HYOT_FEEDBACK_TOKEN }}
          FEEDBACK_INGEST_KEY: ${{ secrets.FEEDBACK_INGEST_KEY }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: .github
