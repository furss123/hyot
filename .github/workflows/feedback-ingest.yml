name: Ingest feedback (ingest key)

on:
  workflow_dispatch:
    inputs:
      payload_json:
        description: Feedback JSON
        required: true
      ingest_key:
        description: Ingest key
        required: true

permissions:
  contents: write

jobs:
  save-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Verify ingest key
        run: |
          if [ "${{ github.event.inputs.ingest_key }}" != "${{ secrets.FEEDBACK_INGEST_KEY }}" ]; then
            echo "::error::Invalid ingest key"
            exit 1
          fi

      - name: Append to feedback.json
        uses: actions/github-script@v7
        with:
          script: |
            const post = JSON.parse(context.payload.inputs.payload_json);
            if (!post?.id) throw new Error("Invalid feedback payload");

            const path = "data/feedback.json";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branches = ["main", "gh-pages"];

            for (const branch of branches) {
              let sha;
              let data = { posts: [] };
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                sha = res.data.sha;
                data = JSON.parse(Buffer.from(res.data.content, "base64").toString("utf8"));
              } catch (err) {
                if (err.status !== 404) throw err;
              }

              data.posts = Array.isArray(data.posts) ? data.posts : [];
              if (!data.posts.some((p) => p.id === post.id)) data.posts.unshift(post);

              const content = Buffer.from(JSON.stringify(data, null, 2) + "\n").toString("base64");
              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                branch,
                message: `feedback: ${post.title || post.id}`,
                content,
                sha,
              });
            }
