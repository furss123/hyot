name: Save feedback

on:
  repository_dispatch:
    types: [hyot_feedback_submit]

permissions:
  contents: write

jobs:
  save-feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Append to feedback.json
        uses: actions/github-script@v7
        with:
          script: |
            const post = context.payload.client_payload;
            if (!post || !post.id) {
              throw new Error("Invalid feedback payload");
            }

            const path = "data/feedback.json";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branches = ["main", "gh-pages"];

            for (const branch of branches) {
              let sha;
              let data = { posts: [] };
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                sha = res.data.sha;
                data = JSON.parse(Buffer.from(res.data.content, "base64").toString("utf8"));
              } catch (err) {
                if (err.status !== 404) throw err;
              }

              data.posts = Array.isArray(data.posts) ? data.posts : [];
              const exists = data.posts.some((p) => p.id === post.id);
              if (!exists) data.posts.unshift(post);

              const content = Buffer.from(JSON.stringify(data, null, 2) + "\n").toString("base64");
              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                branch,
                message: `feedback: ${post.title || post.id}`,
                content,
                sha,
              });
            }
