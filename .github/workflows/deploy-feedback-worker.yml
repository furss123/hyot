name: Deploy feedback relay (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-feedback-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare credentials
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set. Skipping Worker deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Worker
        if: steps.cf.outputs.skip != 'true'
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Set Worker secrets
        if: steps.cf.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.HYOT_FEEDBACK_TOKEN }}
          INGEST_KEY: ${{ secrets.FEEDBACK_INGEST_KEY }}
        run: |
          printf '%s' "$GITHUB_TOKEN" | npx wrangler@3.99.0 secret put GITHUB_TOKEN
          printf '%s' "$INGEST_KEY" | npx wrangler@3.99.0 secret put INGEST_KEY

      - name: Save relay URL secret
        if: steps.cf.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_URL: ${{ steps.wrangler.outputs.deployment-url }}
        run: |
          RELAY_URL="${DEPLOY_URL:-https://hyot-feedback.workers.dev}"
          gh secret set HYOT_FEEDBACK_RELAY_URL --repo "${{ github.repository }}" --body "$RELAY_URL"
          echo "Relay URL: $RELAY_URL"

      - name: Redeploy Pages
        if: steps.cf.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy GitHub Pages" --repo "${{ github.repository }}"
