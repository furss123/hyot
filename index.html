<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HyoT의 자료실 — 업무용 유틸리티를 로그인 없이 무료로 다운로드하세요.">
  <meta name="theme-color" content="#0c0f1a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="HyoT의 자료실">
  <meta property="og:description" content="업무용 유틸리티를 로그인 없이 무료로 다운로드하세요.">
  <meta property="og:locale" content="ko_KR">
  <title>HyoT의 자료실</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container site-header__inner">
      <div class="brand">
        <img class="brand__logo" src="assets/logo.png" alt="" width="86" height="86">
        <div>
          <h1 class="brand__title" id="site-title">HyoT의 자료실</h1>
          <p class="brand__tagline" id="site-tagline">업무용 유틸리티 · 로그인 없이 무료 다운로드</p>
        </div>
      </div>
      <a href="admin.html" class="admin-btn admin-btn--link" id="admin-nav-link">관리자</a>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <h2 class="visually-hidden">자료 목록</h2>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <ul id="utility-grid" class="utility-grid" role="list"></ul>

      <p id="empty-state" class="empty-state" hidden>등록된 자료가 없습니다. 곧 새로운 유틸리티가 추가될 예정입니다.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__copy">&copy; <span id="footer-year"></span> HyoT의 자료실</p>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
  <script>
    if (sessionStorage.getItem("hyot_admin_session") === "1") {
      const link = document.getElementById("admin-nav-link");
      if (link) {
        link.classList.add("admin-btn--active");
        link.textContent = "관리자 ✓";
      }
    }
  </script>
</body>
</html>
