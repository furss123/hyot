<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HyoT의 자료실 — 업무용 유틸리티를 로그인 없이 무료로 다운로드하세요.">
  <meta name="theme-color" content="#0c0f1a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="HyoT의 자료실">
  <meta property="og:description" content="업무용 유틸리티를 로그인 없이 무료로 다운로드하세요.">
  <meta property="og:locale" content="ko_KR">
  <title>HyoT의 자료실</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container site-header__inner">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true"></span>
        <div>
          <h1 class="brand__title" id="site-title">HyoT의 자료실</h1>
          <p class="brand__tagline" id="site-tagline">업무용 유틸리티 · 로그인 없이 무료 다운로드</p>
        </div>
      </div>
      <button type="button" class="admin-btn" id="admin-open-btn" aria-haspopup="dialog">
        관리자
      </button>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <section class="intro" aria-labelledby="intro-heading">
        <h2 id="intro-heading" class="visually-hidden">자료 목록</h2>
        <p class="intro__text" id="site-description">
          관리자가 검증한 유틸리티를 한곳에서 받아보세요. 회원가입 없이 클릭 한 번으로 바로 다운로드됩니다.
        </p>
      </section>

      <div class="toolbar">
        <label class="search" for="search-input">
          <span class="visually-hidden">유틸리티 검색</span>
          <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <path d="M20 20l-3-3" stroke-linecap="round"/>
          </svg>
          <input
            id="search-input"
            class="search__input"
            type="search"
            placeholder="이름·설명으로 검색"
            autocomplete="off"
            enterkeyhint="search"
          >
        </label>
        <p id="result-count" class="toolbar__count" aria-live="polite"></p>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <ul id="utility-grid" class="utility-grid" role="list"></ul>

      <p id="empty-state" class="empty-state" hidden>등록된 자료가 없습니다. 곧 새로운 유틸리티가 추가될 예정입니다.</p>
    </div>
  </main>

  <div id="admin-modal" class="admin-modal" hidden role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
    <div class="admin-modal__backdrop" data-admin-close></div>
    <div class="admin-modal__panel">
      <header class="admin-modal__header">
        <h2 id="admin-modal-title" class="admin-modal__title">관리자</h2>
        <button type="button" class="admin-modal__close" id="admin-close-btn" aria-label="닫기">&times;</button>
      </header>

      <div id="admin-login-view" class="admin-view">
        <p class="admin-lead">저장소에 직접 반영됩니다. GitHub <strong>repo</strong> 권한 토큰이 필요합니다.</p>
        <form id="admin-login-form" class="admin-form">
          <label class="admin-field">
            <span class="admin-field__label">아이디</span>
            <input id="admin-id" class="admin-field__input" type="text" autocomplete="username" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">비밀번호</span>
            <input id="admin-password" class="admin-field__input" type="password" autocomplete="current-password" required>
          </label>
          <label class="admin-field">
            <span class="admin-field__label">GitHub Personal Access Token</span>
            <input id="admin-token" class="admin-field__input" type="password" autocomplete="off" placeholder="ghp_..." required>
          </label>
          <p class="admin-hint">
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=HyoT-admin" target="_blank" rel="noopener noreferrer">토큰 발급</a>
            (classic · <code>repo</code> 권한)
          </p>
          <p id="admin-login-error" class="admin-error" role="alert"></p>
          <button type="submit" class="btn-download admin-form__submit">로그인</button>
        </form>
      </div>

      <div id="admin-panel-view" class="admin-view" hidden>
        <div class="admin-toolbar">
          <span id="admin-user-label" class="admin-user"></span>
          <button type="button" class="admin-link-btn" id="admin-logout-btn">로그아웃</button>
        </div>

        <div class="admin-mode-tabs">
          <button type="button" class="admin-mode admin-mode--active" id="admin-mode-new">새 등록</button>
          <button type="button" class="admin-mode" id="admin-mode-edit">수정</button>
        </div>

        <form id="admin-utility-form" class="admin-form">
          <div id="admin-edit-select-wrap" class="admin-field" hidden>
            <span class="admin-field__label">항목 선택</span>
            <select id="admin-edit-select" class="admin-field__input admin-field__select"></select>
          </div>

          <label class="admin-field">
            <span class="admin-field__label">프로그램 이름</span>
            <input id="admin-name" class="admin-field__input" type="text" required maxlength="80">
          </label>

          <label class="admin-field">
            <span class="admin-field__label">설명</span>
            <textarea id="admin-description" class="admin-field__input admin-field__textarea" rows="3" required maxlength="200"></textarea>
          </label>

          <label class="admin-field">
            <span class="admin-field__label">파일 업로드 <span id="admin-file-required" class="admin-required">*</span></span>
            <input id="admin-file" class="admin-field__file" type="file">
            <span id="admin-file-hint" class="admin-hint">ZIP, EXE 등 배포 파일을 선택하세요.</span>
          </label>

          <label class="admin-field">
            <span class="admin-field__label">업데이트 날짜</span>
            <input id="admin-updated-at" class="admin-field__input admin-field__readonly" type="text" readonly>
            <span class="admin-hint">저장 시 업로드한 날짜(오늘)로 자동 설정됩니다.</span>
          </label>

          <p id="admin-panel-status" class="admin-status" role="status"></p>

          <div class="admin-actions">
            <button type="submit" class="btn-download" id="admin-submit-btn">저장</button>
            <button type="button" class="admin-btn-danger" id="admin-delete-btn" hidden>삭제</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__copy">&copy; <span id="footer-year"></span> HyoT의 자료실</p>
    </div>
  </footer>

  <script src="js/admin-config.js"></script>
  <script src="js/app.js" defer></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
