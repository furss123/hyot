<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0c0f1a">
  <script src="js/theme-init.js"></script>
  <title>페이지를 찾을 수 없습니다 · HyoT의 자료실</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header site-header--compact">
    <div class="container site-header__inner">
      <a href="./" class="brand brand--link">
        <img class="brand__logo" src="assets/logo.png" alt="HyoT" width="86" height="86">
        <div>
          <p class="brand__eyebrow">HyoT의 자료실</p>
          <h1 class="brand__title brand__title--sm">404</h1>
        </div>
      </a>
      <div class="site-header__actions">
        <div class="theme-switch" data-theme-switch role="radiogroup" aria-label="색상 테마">
          <button type="button" class="theme-switch__btn is-active" data-theme-value="system" aria-pressed="true">시스템</button>
          <button type="button" class="theme-switch__btn" data-theme-value="light" aria-pressed="false">라이트</button>
          <button type="button" class="theme-switch__btn" data-theme-value="dark" aria-pressed="false">다크</button>
        </div>
      </div>
    </div>
  </header>

  <main class="site-main error-page error-page--centered" id="main-content">
    <div class="container error-page__inner">
      <p class="error-page__code" aria-hidden="true">404</p>
      <h2 class="error-page__title">페이지를 찾을 수 없습니다</h2>
      <p class="error-page__text">요청하신 주소가 없거나 이동되었을 수 있습니다.</p>
      <a class="btn-download error-page__btn" href="./">자료실 홈으로</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__copy">
        저작권 &copy; <span id="footer-year">2026</span> 남악고등학교 HyoT. All rights reserved.
      </p>
    </div>
  </footer>
  <script src="js/theme.js?v=20260527"></script>
  <script>
    document.getElementById("footer-year").textContent = String(new Date().getFullYear());
  </script>
</body>
</html>
